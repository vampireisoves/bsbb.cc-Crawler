name: BSBB节点爬虫

# 定时触发：北京时间每天 0:00, 6:00, 12:00, 18:00 运行
# GitHub Actions 使用 UTC 时间，北京时间 = UTC + 8
# 北京时间 0:00 = UTC 16:00, 6:00 = UTC 22:00, 12:00 = UTC 4:00, 18:00 = UTC 10:00
on:
  schedule:
    - cron: '0 16,22,4,10 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl
      
      - name: 运行爬虫
        run: python BSBBScrape.py
      
      - name: 配置 Git
        run: |
          git config --global user.name 'vampireisoves'
          git config --global user.email '893751627@qq.com'
      
      - name: 提交更改
        run: |
          git add b64config.json README.md
          git diff --staged --quiet || git commit -m "更新节点数据 $(date '+%Y-%m-%d %H:%M:%S')"
      
      - name: 推送更改
        run: |
          git config credential.helper store
          git push https://${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

  del_runs:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 4
